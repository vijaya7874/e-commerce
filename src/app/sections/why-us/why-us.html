<section class="why pad" id="why">
  <div class="shell">
    <header class="head head--center">
      <p class="eyebrow" appReveal>Why organic</p>
      <h2 class="head__title" appReveal [revealDelay]="0.1">Clean, simple, and honest</h2>
      <p class="head__sub" appReveal [revealDelay]="0.2">
        We do not just sell powders. We stand for everyday nutrition with nothing to hide.
      </p>
    </header>

    <div class="why__grid">
      @for (perk of perks(); track perk.title; let i = $index) {
        <article class="perk" appReveal [revealDelay]="i * 0.1">
          <span class="perk__ring">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" aria-hidden="true">
              <path [attr.d]="path(perk.icon)" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <h3 class="perk__title">{{ perk.title }}</h3>
          <p class="perk__body">{{ perk.body }}</p>
        </article>
      }
    </div>
  </div>
</section>
