<section class="revs pad" id="reviews">
  <div class="shell">
    <header class="head head--center">
      <p class="eyebrow" appReveal>Kind words</p>
      <h2 class="head__title" appReveal [revealDelay]="0.1">Loved across India</h2>
    </header>

    <div class="revs__stage" appReveal [revealDelay]="0.15">
      <button type="button" class="revs__arrow revs__arrow--prev" (click)="prev()" aria-label="Previous">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" aria-hidden="true">
          <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="revs__track">
        <div class="revs__rail" [style.transform]="'translateX(-' + active() * 100 + '%)'">
          @for (t of items(); track t.name) {
            <figure class="rev glass">
              <span class="rev__stars stars">{{ star(t.stars) }}</span>
              <blockquote class="rev__words">“{{ t.words }}”</blockquote>
              <figcaption class="rev__who">
                <span class="rev__avatar">{{ t.initials }}</span>
                <span>
                  <span class="rev__name">{{ t.name }}</span>
                  <span class="rev__place">{{ t.place }}</span>
                </span>
              </figcaption>
            </figure>
          }
        </div>
      </div>

      <button type="button" class="revs__arrow revs__arrow--next" (click)="next()" aria-label="Next">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" aria-hidden="true">
          <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="revs__dots">
      @for (t of items(); track t.name; let i = $index) {
        <button
          type="button"
          class="revs__dot"
          [class.is-on]="active() === i"
          (click)="go(i)"
          [attr.aria-label]="'Review ' + (i + 1)"></button>
      }
    </div>
  </div>
</section>
