<section class="stats">
  <div class="stats__blob" aria-hidden="true"></div>
  <div class="shell stats__grid">
    @for (s of stats(); track s.label) {
      <div class="stat">
        <span class="stat__num">0{{ s.suffix }}</span>
        <span class="stat__label">{{ s.label }}</span>
      </div>
    }
  </div>
</section>
